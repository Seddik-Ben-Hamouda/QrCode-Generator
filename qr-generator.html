<style>
  :root{
    --ink:#141414;
    --paper:#F7F5F0;
    --signal:#FF5A1F;
    --teal:#2D9C8A;
    --graphite:#3A3A3A;
    --graphite-soft:#54514c;
  }
  *{box-sizing:border-box;}
  body{
    background:var(--ink);
    font-family:'Inter',sans-serif;
    color:var(--paper);
  }
  .font-display{font-family:'Space Grotesk',sans-serif;}
  .font-mono{font-family:'JetBrains Mono',monospace;}

  .grain{
    background-image: radial-gradient(circle at 1px 1px, rgba(247,245,240,0.045) 1px, transparent 0);
    background-size: 22px 22px;
  }

  .field-input{
    background:transparent;
    border:1px solid var(--graphite);
    color:var(--paper);
    transition:border-color .15s ease, background .15s ease;
  }
  .field-input:focus{
    outline:none;
    border-color:var(--signal);
    background:rgba(255,90,31,0.04);
  }
  .field-input::placeholder{color:#7a776f;}

  .tab-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.06em;
    color:#8a8780;
    border-bottom:2px solid transparent;
    transition:color .15s ease, border-color .15s ease;
  }
  .tab-btn.active{
    color:var(--paper);
    border-color:var(--signal);
  }
  .tab-btn:hover:not(.active){color:var(--paper);}

  .swatch{
    width:28px;height:28px;border-radius:4px;cursor:pointer;
    border:2px solid rgba(247,245,240,0.15);
    transition:transform .12s ease, border-color .12s ease;
  }
  .swatch:hover{transform:scale(1.08);}
  .swatch.selected{border-color:var(--paper);}

  /* Viewfinder */
  .viewfinder{
    position:relative;
    background:var(--paper);
  }
  .corner{
    position:absolute;
    width:22px;height:22px;
    border-color:var(--signal);
  }
  .corner.tl{top:-1px;left:-1px;border-top:3px solid;border-left:3px solid;}
  .corner.tr{top:-1px;right:-1px;border-top:3px solid;border-right:3px solid;}
  .corner.bl{bottom:-1px;left:-1px;border-bottom:3px solid;border-left:3px solid;}
  .corner.br{bottom:-1px;right:-1px;border-bottom:3px solid;border-right:3px solid;}

  .scanline{
    position:absolute;
    left:6%;right:6%;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--teal), transparent);
    opacity:0.85;
    animation:scan 2.6s ease-in-out infinite;
  }
  @keyframes scan{
    0%{top:8%;}
    50%{top:92%;}
    100%{top:8%;}
  }
  @media (prefers-reduced-motion: reduce){
    .scanline{animation:none; display:none;}
  }

  .btn-primary{
    background:var(--signal);
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    transition:transform .12s ease, background .15s ease;
  }
  .btn-primary:hover{transform:translateY(-1px); background:#ff6b37;}
  .btn-primary:active{transform:translateY(0);}

  .btn-ghost{
    border:1px solid var(--graphite);
    color:var(--paper);
    font-family:'JetBrains Mono',monospace;
    transition:border-color .15s ease, background .15s ease;
  }
  .btn-ghost:hover{border-color:var(--paper); background:rgba(247,245,240,0.05);}

  .label-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.14em;
    color:var(--signal);
    text-transform:uppercase;
  }

  input[type=range]{
    -webkit-appearance:none;
    height:2px;
    background:var(--graphite);
    border-radius:2px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px;height:14px;
    border-radius:50%;
    background:var(--signal);
    cursor:pointer;
    margin-top:-6px;
  }
  input[type=range]::-moz-range-thumb{
    width:14px;height:14px;border-radius:50%;
    background:var(--signal);border:none;cursor:pointer;
  }

  ::selection{background:var(--signal); color:var(--ink);}

  #qr-container canvas, #qr-container img{
    max-width:100%;
    height:auto;
    display:block;
  }

  /* ── Mobile-first responsive fixes ── */

  /* Scrollable tab bar on small screens */
  .tab-bar{
    display:flex;
    gap:0;
    border-bottom:1px solid var(--graphite);
    margin-bottom:1.75rem;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex-shrink:0;
    padding-bottom:0.75rem;
    padding-right:1.25rem;
  }

  /* Viewfinder scales with its container */
  .viewfinder{
    width:100%;
    min-height:260px;
  }

  /* QR canvas / img inside viewfinder: never overflow */
  #qr-container{
    max-width:100%;
    overflow:hidden;
  }
  #qr-container canvas,
  #qr-container img{
    max-width:100% !important;
    height:auto !important;
    width:auto !important;
  }

  /* Download buttons always full-width on mobile */
  @media(max-width:479px){
    .download-row{
      flex-direction:column;
    }
    .download-row .btn-ghost{
      width:100%;
      justify-content:center;
    }
  }

  /* Increase tap targets on touch screens */
  @media(max-width:767px){
    .tab-btn{
      padding-bottom:0.75rem;
      padding-right:1rem;
      font-size:10px;
    }
    .swatch{
      width:34px;
      height:34px;
    }
    input[type=range]::-webkit-slider-thumb{
      width:20px;
      height:20px;
      margin-top:-9px;
    }
    input[type=range]::-moz-range-thumb{
      width:20px;
      height:20px;
    }
    input[type=range]{
      height:3px;
    }
    .field-input{
      font-size:16px; /* prevents iOS zoom on focus */
    }
    .btn-primary,
    .btn-ghost{
      min-height:48px;
    }
  }
</style>
</head>

<script>
lucide.createIcons();

const eccMap = ['L — max capacity','M — balanced','Q — sturdy','H — max resilience'];
const eccVal = ['L','M','Q','H'];
let currentType = 'url';
let fgColor = '#141414';
let bgColor = '#F7F5F0';
let size = 320;
let ecc = 'M';
let svgString = '';

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentType = btn.dataset.type;
    document.querySelectorAll('.panel').forEach(p=> p.classList.add('hidden'));
    document.querySelector(`.panel[data-panel="${currentType}"]`).classList.remove('hidden');
    render();
  });
});

// Swatches
function setupSwatches(containerId, apply){
  document.querySelectorAll(`#${containerId} .swatch`).forEach(sw=>{
    sw.addEventListener('click', ()=>{
      document.querySelectorAll(`#${containerId} .swatch`).forEach(s=>s.classList.remove('selected'));
      sw.classList.add('selected');
      apply(sw.dataset.color);
      render();
    });
  });
}
setupSwatches('fg-swatches', c=> fgColor = c);
setupSwatches('bg-swatches', c=> bgColor = c);

// Sliders
const eccSlider = document.getElementById('ecc-slider');
eccSlider.addEventListener('input', ()=>{
  const i = parseInt(eccSlider.value);
  ecc = eccVal[i];
  document.getElementById('ecc-label').textContent = eccMap[i];
  render();
});
const sizeSlider = document.getElementById('size-slider');
sizeSlider.addEventListener('input', ()=>{
  size = parseInt(sizeSlider.value);
  document.getElementById('size-label').textContent = size + 'px';
  render();
});

// Inputs -> render on any change
document.querySelectorAll('input, textarea, select').forEach(el=>{
  el.addEventListener('input', render);
});

function buildPayload(){
  if(currentType === 'url'){
    return document.getElementById('input-url').value.trim();
  }
  if(currentType === 'wifi'){
    const ssid = document.getElementById('wifi-ssid').value.trim();
    const pass = document.getElementById('wifi-pass').value.trim();
    const sec = document.getElementById('wifi-security').value;
    if(!ssid) return '';
    return `WIFI:T:${sec};S:${ssid};${sec==='nopass'?'':'P:'+pass+';'}${sec==='nopass'?'':''};`;
  }
  if(currentType === 'vcard'){
    const name = document.getElementById('vc-name').value.trim();
    const phone = document.getElementById('vc-phone').value.trim();
    const email = document.getElementById('vc-email').value.trim();
    const org = document.getElementById('vc-org').value.trim();
    if(!name && !phone && !email) return '';
    return `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nORG:${org}\nTEL:${phone}\nEMAIL:${email}\nEND:VCARD`;
  }
  if(currentType === 'email'){
    const to = document.getElementById('em-to').value.trim();
    const subject = encodeURIComponent(document.getElementById('em-subject').value.trim());
    const body = encodeURIComponent(document.getElementById('em-body').value.trim());
    if(!to) return '';
    return `mailto:${to}?subject=${subject}&body=${body}`;
  }
  return '';
}

let qrInstance = null;

function buildSvgFromModel(model, fg, bg, sizePx, margin){
  const count = model.moduleCount;
  const cell = sizePx / (count + margin * 2);
  let rects = '';
  for(let r=0; r<count; r++){
    for(let c=0; c<count; c++){
      if(model.isDark(r, c)){
        const x = ((c + margin) * cell).toFixed(2);
        const y = ((r + margin) * cell).toFixed(2);
        rects += `<rect x="${x}" y="${y}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}" fill="${fg}"/>`;
      }
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${sizePx} ${sizePx}" width="${sizePx}" height="${sizePx}"><rect width="${sizePx}" height="${sizePx}" fill="${bg}"/>${rects}</svg>`;
}

async function render(){
  const payload = buildPayload();
  const container = document.getElementById('qr-container');
  const emptyState = document.getElementById('empty-state');

  if(typeof QRCode === 'undefined'){
    emptyState.textContent = 'QR library failed to load — check your internet connection and refresh.';
    emptyState.classList.remove('hidden');
    return;
  }

  container.innerHTML = '';

  if(!payload){
    const isMobile = window.innerWidth < 768;
    emptyState.textContent = isMobile
      ? 'Nothing to encode yet — start typing above.'
      : 'Nothing to encode yet — start typing on the left.';
    emptyState.classList.remove('hidden');
    svgString = '';
    return;
  }
  emptyState.classList.add('hidden');

  try{
    qrInstance = new QRCode(container, {
      text: payload,
      width: size,
      height: size,
      colorDark: fgColor,
      colorLight: bgColor,
      correctLevel: QRCode.CorrectLevel[ecc]
    });
    svgString = buildSvgFromModel(qrInstance._oQRCode, fgColor, bgColor, size, 1);
  }catch(e){
    console.error(e);
    svgString = '';
  }
}

document.getElementById('btn-png').addEventListener('click', ()=>{
  const canvas = document.querySelector('#qr-container canvas');
  if(!canvas) return;
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

document.getElementById('btn-svg').addEventListener('click', ()=>{
  if(!svgString) return;
  const blob = new Blob([svgString], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = 'qrcode.svg';
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
});

// initial
document.getElementById('input-url').value = 'https://sportify.tn';
render();
